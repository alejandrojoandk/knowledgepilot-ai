services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: knowledgepilot-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./chroma_db:/app/chroma_db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: knowledgepilot-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend